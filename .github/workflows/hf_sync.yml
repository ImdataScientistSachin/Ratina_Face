name: Sync to Hugging Face hub
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: python -m pip install huggingface_hub

      - name: Upload to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        shell: python
        run: |
          import os
          from huggingface_hub import upload_folder

          token = os.environ.get('HF_TOKEN')
          if not token:
              raise ValueError('HF_TOKEN secret is missing or empty!')

          print('Connecting to Hugging Face...')
          upload_folder(
              folder_path='.',
              repo_id='ImdataScientistSachin/Ratina_face',
              repo_type='space',
              token=token,
              ignore_patterns=[
                  'examples/*',
                  '__pycache__/*',
                  '*.pyc',
                  '.git/*',
                  'upload_to_hf.py',
                  '.github/*',
                  'tests/*'
              ],
              commit_message='deploy: python-native sync from GitHub Actions'
          )
          print('✅ Upload Successful!')
